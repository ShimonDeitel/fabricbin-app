name: FabricBin
options:
  bundleIdPrefix: com.shimondeitel.fabricbin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  FabricBin:
    type: application
    platform: iOS
    sources:
      - path: FabricBin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fabricbin
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: FabricBin/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FabricBinTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FabricBinTests
      - path: FabricBin.storekit
    dependencies:
      - target: FabricBin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fabricbin.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FabricBinUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FabricBinUITests
    dependencies:
      - target: FabricBin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fabricbin.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  FabricBin:
    build:
      targets:
        FabricBin: all
        FabricBinTests: [test]
        FabricBinUITests: [test]
    test:
      targets:
        - FabricBinTests
        - FabricBinUITests
